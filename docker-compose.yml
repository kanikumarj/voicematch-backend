version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: voicematch_postgres
    environment:
      POSTGRES_DB:       voicematch_dev
      POSTGRES_USER:     voicematch
      POSTGRES_PASSWORD: devpassword123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U voicematch -d voicematch_dev"]
      interval: 5s
      timeout:  5s
      retries:  5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: voicematch_redis
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout:  3s
      retries:  5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
